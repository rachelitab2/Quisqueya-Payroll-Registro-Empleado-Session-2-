<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quisqueya Payroll - Registro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Quisqueya Payroll - Registro Empleado</h1>
        <form id="formEmpleado">
            <div class="campo">
                <label>Nombre Empleado</label>
                <input type="text" id="nombre" placeholder="Ej:" Maria Perez">
                <span class="error" id="errorNombre"></span>
            </div>

            <div class="campo">
                <label>Cedula</label>
                <input type="text" id="cedula" placeholder="Ej: 402-1234567-8 ">
                <span class="error" id="errorCedula"></span>
            </div>

            <div class="campo">
                <label>Email</label>
                <input type="email" id="email" placeholder="Ej: maria.perez@example.com">
                <span class="error" id="errorEmail"></span>
            </div>

            <div class="campo">
                <label>Telefono</label>
                <input type="text" id="telefono" placeholder="Ej: 809-123-4567">
                <span class="error" id="errorTelefono"></span>
            </div>

            <div class="campo">
                <label>Salario bruto (RD$)</label>
                <input type="number" id="salario" placeholder="Ej: 50000">
                <span class="error" id="errorSalario"></span>
            </div>

            <div class="calc">
                <h3>Calcular automatico</h3>
                <div class="linea"><span>AFP (2.87%)</span><span id="resAFP">RD$ 0.00</span></div>
                <div class="linea"><span>ARS (3.04%)</span><span id="resSFS">RD$ 0.00</span></div>
                <div class="linea neto"><span>Neto a recibir</span><span id="resNeto">RD$ 0.00</span></div>

            </div>

            <button type="submit" id="btnGuardar">Guardar Empleado</button>

        </form>

        <h2>Empleados Registrados</h2>
        <table id="tablaEmpleados">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Cedula</th>
                    <th>Email</th>
                    <th>Telefono</th>
                    <th>Salario Bruto</th>
                    <th>AFP</th>
                    <th>ARS</th>
                    <th>Neto a Recibir</th>
                </tr>
            </thead>
            <tbody id="tbodyEmpleados"></tbody>
            </table>
    </div>
    <script src="app.js"></script>
</body>
</html>
